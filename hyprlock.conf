# =====================================================
#   IMPERIAL HYPRLOCK — Galactic Empire Security
#   Angular HUD aesthetic — no rounded corners
#   Sith red command · cold blue hologram data
# =====================================================

background {
    monitor =
    path = ~/.config/omarchy/current/background
    blur_passes = 2
    blur_size = 5
    contrast = 0.8
    brightness = 0.55
    vibrancy = 0.7
    vibrancy_darkness = 0.4
}

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

animations {
    enabled = true
}

# ── Left rank stripe — full height red bar ──
shape {
    monitor =
    size = 4, 320
    color = rgba(160, 0, 0, 0.9)
    rounding = 0
    border_size = 0
    rotate = 0
    position = -158, 0
    halign = center
    valign = center
}

# ── Top horizontal bar ──
shape {
    monitor =
    size = 340, 1
    color = rgba(140, 0, 0, 0.6)
    rounding = 0
    border_size = 0
    rotate = 0
    position = 34, 145
    halign = center
    valign = center
}

# ── Bottom horizontal bar ──
shape {
    monitor =
    size = 340, 1
    color = rgba(20, 50, 160, 0.6)
    rounding = 0
    border_size = 0
    rotate = 0
    position = 34, -310
    halign = center
    valign = center
}

# ── Profile image — sharp square, red border ──
image {
    monitor =
    path = ~/.config/omarchy/current/theme/profile.jpg
    border_size = 2
    border_color = rgba(160, 0, 0, 0.9)
    size = 90
    rounding = 0
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 25, 200
    halign = center
    valign = center
}

# ── Rank label — Imperial designation ──
label {
    monitor =
    text = IMPERIAL OFFICER
    color = rgba(200, 0, 0, 0.85)
    font_size = 9
    font_family = JetBrainsMono Nerd Font Bold
    position = 25, 130
    halign = center
    valign = center
}

# ── Username ──
label {
    monitor =
    text = $USER
    color = rgba(160, 180, 210, 0.9)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 25, 110
    halign = center
    valign = center
}

# ── Clock — large Sith red ──
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(200, 10, 0, 0.95)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold
    position = 30, -8
    halign = center
    valign = center
}

# ── Date — cold blue hologram ──
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A • %B %d • %Y")"
    color = rgba(60, 120, 200, 0.7)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 35, -75
    halign = center
    valign = center
}

# ── Separator ──
shape {
    monitor =
    size = 280, 1
    color = rgba(100, 0, 0, 0.4)
    rounding = 0
    border_size = 0
    rotate = 0
    position = 34, -110
    halign = center
    valign = center
}

# ── Password field — sharp Imperial terminal ──
input-field {
    monitor =
    size = 300, 48
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(6, 4, 4, 0.85)
    font_color = rgb(160, 0, 0)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Bold
    placeholder_text = <i><span foreground="##3a4a6a99">ENTER CLEARANCE CODE</span></i>
    hide_input = false
    check_color = rgba(40, 100, 220, 1.0)
    fail_color = rgba(220, 0, 0, 1.0)
    fail_text = <i><span foreground="##cc0000cc">⚠  ACCESS DENIED</span></i>
    capslock_color = rgba(180, 60, 0, 1.0)

    # Sharp left border only — Imperial rank style
    position = 34, -160
    halign = center
    valign = center
}

# ── Imperial footer ──
label {
    monitor =
    text = 〔 GALACTIC EMPIRE · SECURITY DIVISION 〕
    color = rgba(180, 0, 0, 0.7)
    font_size = 9
    font_family = JetBrainsMono Nerd Font
    position = 34, -230
    halign = center
    valign = center
}

# ── Classification stamp ──
label {
    monitor =
    text = TOP SECRET // SCI // IMPERIAL USE ONLY
    color = rgba(60, 100, 180, 0.6)
    font_size = 8
    font_family = JetBrainsMono Nerd Font
    position = 34, -250
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = false
}
